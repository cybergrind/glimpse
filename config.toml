[[panels]]
position = "top"
applets = ["spacer","clock_custom", "weather", "notifications", "spacer", "tray", "network", "bluetooth", "audio", "battery", "session"]

[applets.clock_custom]
extends = "clock"
format = "%a %b %d, %H:%M"
timezones = [
    {name= "Minsk", timezone= "Europe/Minsk", format= "%H:%M:%S"},
    {name= "St. Gallen", timezone= "Europe/Zurich"},
    {name="Tbilisi", timezone="Asia/Tbilisi"}
]

[applets.weather]
extends = "weather"
city_name = "Warsaw"
geolocate = false

[applets.network]
extends = "network"
settings_command = "nm-connection-editor"

[applets.notifications]
extends = "notifications"
badge_style = "count"      # "dot" = accent dot, "count" = number (max 9+), "" = no badge

