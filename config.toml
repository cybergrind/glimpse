# [applets.battery_icon_only]
# extends = "battery"
# label_on_battery = ""
# label_on_ac = ""
# tooltip_on_battery = ""
# tooltip_on_ac = ""

[applets.keyboard]
extends = "keyboard"
format = "short"
per_window = true


[applets.exec_demo]
extends = "exec"
command = ["/home/alex/.config/glimpse/bin/custom_applet"]
restart_delay_ms = 10000

[wallpaper]
path = "/home/alex/wallpapers/tokyonight-02.jpg"
