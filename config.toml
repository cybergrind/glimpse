# [[panels]]
# position = "bottom"
# applets = ["spacer", "clock"]

[[panels]]
position = "top"
applets = ["pager", "sysinfo", "mpris", "spacer","clock_custom", "weather", "notifications", "privacy", "spacer", "tray", "keyboard", "network", "bluetooth", "audio", "battery", "session"]

[applets.clock_custom]
extends = "clock"
format = "%a %b %d, %H:%M"
timezones = [
    {name= "Minsk", timezone= "Europe/Minsk"},
    {name= "St. Gallen", timezone= "Europe/Zurich"},
    {name="St. Petersburg", timezone="Europe/Moscow"},
    {name="Tbilisi", timezone="Asia/Tbilisi"}
]

[applets.sysinfo]
extends = "exec"
command = ["/home/alex/projects/glimpse/var/sysstats/sysstats-applet"]

[applets.weather]
extends = "weather"
city_name = "Warsaw"
geolocate = false
hourly_slots = 5
forecast_days = 5

[applets.network]
extends = "network"
settings_command = "nm-connection-editor"

[applets.notifications]
extends = "notifications"
badge_style = "count"      # "dot" = accent dot, "count" = number (max 9+), "" = no badge

