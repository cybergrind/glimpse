name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  binary-and-aur:
    name: Build binary release and publish AUR
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    env:
      AUR_PKG: glimpse-desktop-bin
      AUR_REMOTE: ssh://aur@aur.archlinux.org/glimpse-desktop-bin.git
      AUR_KEY_SET: ${{ secrets.AUR_SSH_PRIVATE_KEY != '' }}
    steps:
      - name: Install build and release dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            cargo \
            clang \
            git \
            github-cli \
            gtk4 \
            gtk4-layer-shell \
            libadwaita \
            libheif \
            openssh \
            pam \
            pkgconf \
            zstd

      - name: Check out source
        uses: actions/checkout@v4

      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Restore Cargo dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: ${{ runner.os }}-arch-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-arch-cargo-

      - name: Restore Cargo build cache
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-arch-target-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-arch-target-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-arch-target-

      - name: Verify tag matches workspace version
        run: |
          version="$(awk -F'"' '/^version = / { print $2; exit }' Cargo.toml)"
          tag="${GITHUB_REF_NAME#v}"
          test "$version" = "$tag"

      - name: Test release crates
        run: |
          cargo test --locked -p glimpse-core
          cargo test --locked -p glimpse-idle
          cargo test --locked -p glimpse-lock
          cargo test --locked -p glimpse-sunset
          cargo test --locked -p glimpse-wallpaper
          cargo check --locked -p glimpse-lock
          cargo check --locked -p glimpse-shell
          cargo check --locked -p glimpse-idle
          cargo check --locked -p glimpse-sunset
          cargo check --locked -p glimpse-wallpaper

      - name: Build binary archive
        id: package
        run: |
          asset="$(scripts/package-binary.sh "${GITHUB_REF_NAME#v}")"
          checksum="$(b2sum "$asset" | awk '{ print $1 }')"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release asset
        if: env.ACT != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "${{ steps.package.outputs.asset }}" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes "Glimpse ${GITHUB_REF_NAME#v}" \
          || gh release upload "$GITHUB_REF_NAME" "${{ steps.package.outputs.asset }}" --clobber

      - name: Configure AUR SSH
        if: env.ACT != 'true' && env.AUR_KEY_SET == 'true'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > "$HOME/.ssh/aur"
          chmod 600 "$HOME/.ssh/aur"
          ssh-keyscan -H aur.archlinux.org > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          ssh -i "$HOME/.ssh/aur" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            aur@aur.archlinux.org help >/dev/null 2>&1

      - name: Publish AUR package
        if: env.ACT != 'true' && env.AUR_KEY_SET == 'true'
        run: |
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          version="${GITHUB_REF_NAME#v}"
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          git clone "$AUR_REMOTE" "$tmpdir"
          scripts/render-aur-pkgbuild.sh "$version" "${{ steps.package.outputs.checksum }}" > "$tmpdir/PKGBUILD"
          cd "$tmpdir"
          useradd -m builder
          chown -R builder:builder "$tmpdir"
          git config --global --add safe.directory "$tmpdir"
          runuser -u builder -- makepkg --printsrcinfo > .SRCINFO
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "AUR package $AUR_PKG already up to date"
          else
            git commit -m "Release $version"
            git push origin master
          fi

      - name: Skip AUR publish
        if: env.ACT != 'true' && env.AUR_KEY_SET != 'true'
        run: echo "AUR_SSH_PRIVATE_KEY is not configured; GitHub release asset was published, AUR publish skipped."

      - name: Render AUR metadata for act
        if: env.ACT == 'true'
        run: |
          version="${GITHUB_REF_NAME#v}"
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          scripts/render-aur-pkgbuild.sh "$version" "${{ steps.package.outputs.checksum }}" > "$tmpdir/PKGBUILD"
          useradd -m builder
          chown -R builder:builder "$tmpdir"
          runuser -u builder -- bash -c 'cd "$1" && makepkg --printsrcinfo' bash "$tmpdir" > dist/.SRCINFO
          cp "$tmpdir/PKGBUILD" dist/PKGBUILD
          test -s dist/.SRCINFO
