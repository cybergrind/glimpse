name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    env:
      CARGO_INCREMENTAL: "1"
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            cargo \
            git \
            gtk4 \
            gtk4-layer-shell \
            libadwaita \
            libheif \
            pam \
            pkgconf

      - name: Check out source
        uses: actions/checkout@v4

      - name: Restore Cargo dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: ${{ runner.os }}-arch-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-arch-cargo-

      - name: Restore Cargo build cache
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-arch-target-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-arch-target-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-arch-target-

      - name: Verify lockfile
        run: cargo fetch --locked

      - name: Test core and daemon crates
        run: |
          cargo test --locked -p glimpse-core
          cargo test --locked -p glimpse-idle
          cargo test --locked -p glimpse-lock
          cargo test --locked -p glimpse-sunset
          cargo test --locked -p glimpse-wallpaper

      - name: Check daemons
        run: |
          cargo check --locked -p glimpse-lock
          cargo check --locked -p glimpse-shell
          cargo check --locked -p glimpse-idle
          cargo check --locked -p glimpse-sunset
          cargo check --locked -p glimpse-wallpaper

      - name: Build release binaries
        run: |
          cargo build --release --locked -p glimpse --bin glimpse-panel --no-default-features
          cargo build --release --locked -p glimpse-lock
          cargo build --release --locked -p glimpse-shell
          cargo build --release --locked -p glimpse-idle
          cargo build --release --locked -p glimpse-sunset
          cargo build --release --locked -p glimpse-wallpaper
